[toolchain]
anchor_version = "0.31.1"

[workspace]
members = [
    "programs/clearstone_core",
    "reference_adapters/generic_exchange_rate_sy",
    "reference_adapters/malicious_sy_nonsense",
    "reference_adapters/malicious_sy_reentrant",
    "reference_adapters/mock_klend",
    "reference_adapters/mock_flash_callback",
    "reference_adapters/kamino_sy_adapter",
    "periphery/clearstone_rewards",
    "periphery/clearstone_curator",
    "periphery/clearstone_router",
]

[features]
resolution = false
skip-lint = false

[programs.localnet]
clearstone_core = "DZmP7zaBrc6FdJc842aeexnGV5YwPucg2Jv8p6Szh6hW"
generic_exchange_rate_sy = "HA1T2p7DkktepgtwrVqNBK8KidAYr5wvS1uKqzvScNm3"
malicious_sy_nonsense = "jEsn9RSpNmmG8tFTo6TjYM8WxVyP9p6sBVGLbHZxZJs"
malicious_sy_reentrant = "FNh2bhq9exxygNfJTd2ZCmUubB5Tdk51D5od2NLKCsv8"
mock_klend = "AKeo9L8sGnMABrsUs7gJAk8WLye62hSJ7ikZ6yytCGkv"
mock_flash_callback = "9AduMJSRv79G5UBrj3WZCK1KzpzmZ4zAKV4Mud4Z4hvF"
kamino_sy_adapter = "29tisXppYM4NcAEJfzMe1aqyuf2M7w9StTtiXBHxTKxd"
clearstone_rewards = "7ddrynBQiCNjxejxRwxvSbDb56k8F8Yp4KwYgfiaHX8g"
clearstone_curator = "831zw8r2fGwRB1QpuRU3gZHZBFYYHBHeG7RbKUz9ssGm"
clearstone_router = "DenU4j4oV4wCMCsytrfYuFwAumTE1abFAPmpYDpjWmsW"
clearstone_solver_callback = "27UhEF34wbyPdZw4nnAFUREU5LHMFs55PethnhJ6yNCP"

# Devnet program IDs intentionally match localnet 1:1 so `declare_id!`
# stays stable across clusters — see DEPLOY_IDS.md. The two test-only
# mocks (malicious_sy_*) are *not* listed here; they don't ship to devnet.
[programs.devnet]
clearstone_core = "DZmP7zaBrc6FdJc842aeexnGV5YwPucg2Jv8p6Szh6hW"
generic_exchange_rate_sy = "HA1T2p7DkktepgtwrVqNBK8KidAYr5wvS1uKqzvScNm3"
clearstone_rewards = "7ddrynBQiCNjxejxRwxvSbDb56k8F8Yp4KwYgfiaHX8g"
clearstone_curator = "831zw8r2fGwRB1QpuRU3gZHZBFYYHBHeG7RbKUz9ssGm"
clearstone_router = "DenU4j4oV4wCMCsytrfYuFwAumTE1abFAPmpYDpjWmsW"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "./testkp.json"

# Devnet provider — selected at `anchor deploy --provider.cluster devnet`
# time or by sourcing .env.devnet. Wallet path is the dedicated devnet
# deployer keypair (created via scripts/devnet-deploy-init.sh).
[provider.devnet]
cluster = "https://api.devnet.solana.com"
wallet = "~/.config/solana/clearstone-devnet.json"

[scripts]
test = "yarn run mocha --import=tsx --timeout 1000000 tests/**/*.ts"

# Clone the Metaplex Token Metadata program from mainnet into the
# local test validator — `initialize_vault` invokes it to create PT
# metadata and it's not part of the bare `solana-test-validator`
# image. Metaplex is the only clone that's needed for the Step 2
# test suites; pulling it from mainnet is fast and not rate-limited.
[[test.validator.clone]]
address = "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s"

# TEMP (2026-04-24): devnet-only clones disabled because
# api.devnet.solana.com rate-limits this IP aggressively and the
# validator's clone-fetch retries burn through that budget before
# tests can start. These are only needed by
# tests/clearstone-kyc-pass-through.ts and
# tests/clearstone-fusion-flash.ts — neither of which is required
# for Step 2 coverage (curator / rewards / router / core). Re-enable
# after moving them behind an API-keyed RPC or copying the program
# binaries into target/deploy/.
# [[test.validator.clone]]
# address = "BKprvLqNUDCGrpxddppHHQ3UBhof8J5axyexDyctX1xy" # delta_mint
# [[test.validator.clone]]
# address = "6xqW3D1ebp5WjbYh4vwar7ponxrpEaQiVG6uhBYVZtJi" # governor
# [[test.validator.clone]]
# address = "gatem74V238djXdzWnJf94Wo1DcnuGkfijbf3AuBhfs"
# [[test.validator.clone]]
# address = "9ShSnLUcWeg5BZzokj8mdo9cNHARCKa42kwmqSdBNM6J" # clearstone_fusion
# [[test.validator.clone]]
# address = "27UhEF34wbyPdZw4nnAFUREU5LHMFs55PethnhJ6yNCP" # clearstone_solver_callback

# Mainnet URL for the Metaplex clone above. Not rate-limited for the
# single program fetch we need at validator startup.
[test.validator]
url = "https://api.mainnet-beta.solana.com"
bind_address = "127.0.0.1"

[test]
startup_wait = 60000
