    "programs/clearstone_core",
    "reference_adapters/generic_exchange_rate_sy",
    "reference_adapters/malicious_sy_nonsense",
    "reference_adapters/malicious_sy_reentrant",
    "reference_adapters/mock_klend",
    "reference_adapters/kamino_sy_adapter",
    "periphery/clearstone_rewards",
    "periphery/clearstone_curator",
    "periphery/clearstone_router",
]

[features]
resolution = false
skip-lint = false

[programs.localnet]
clearstone_core = "EKpLcVc6rky1ah28NMZFoT2oSXkAKWcEsr6nbZziTWbC"
generic_exchange_rate_sy = "DZEqpkctMmB1Xq6foy1KnP3VayVFgJfykzi49fpWZ8M6"
