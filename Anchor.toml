[toolchain]
anchor_version = "0.31.1"

[workspace]
members = [
    "programs/clearstone_core",
    "reference_adapters/generic_exchange_rate_sy",
    "reference_adapters/malicious_sy_nonsense",
    "reference_adapters/malicious_sy_reentrant",
    "periphery/clearstone_rewards",
    "periphery/clearstone_curator",
    "periphery/clearstone_router",
]

[features]
resolution = false
skip-lint = false

[programs.localnet]
clearstone_core = "EKpLcVc6rky1ah28NMZFoT2oSXkAKWcEsr6nbZziTWbC"
generic_exchange_rate_sy = "DZEqpkctMmB1Xq6foy1KnP3VayVFgJfykzi49fpWZ8M6"
malicious_sy_nonsense = "jEsn9RSpNmmG8tFTo6TjYM8WxVyP9p6sBVGLbHZxZJs"
malicious_sy_reentrant = "FNh2bhq9exxygNfJTd2ZCmUubB5Tdk51D5od2NLKCsv8"
clearstone_rewards = "7ddrynBQiCNjxejxRwxvSbDb56k8F8Yp4KwYgfiaHX8g"
clearstone_curator = "831zw8r2fGwRB1QpuRU3gZHZBFYYHBHeG7RbKUz9ssGm"
clearstone_router = "DenU4j4oV4wCMCsytrfYuFwAumTE1abFAPmpYDpjWmsW"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "./testkp.json"

[scripts]
test = "yarn run mocha --import=tsx --timeout 1000000 tests/**/*.ts"

# Clone the Metaplex Token Metadata program from mainnet into the
# local test validator — `initialize_vault` invokes it to create PT
# metadata and it's not part of the bare `solana-test-validator`
# image. First `anchor test` run with this block present will fetch
# it from the cluster below.
[[test.validator.clone]]
address = "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s"

[test.validator]
url = "https://api.mainnet-beta.solana.com"
